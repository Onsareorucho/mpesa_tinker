version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mpesa_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mpesa
      MYSQL_USER: mpesa
      MYSQL_PASSWORD: password
    ports:
      - '3305:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mpesa_network

volumes:
  mysql_data:

networks:
  mpesa_network:
    driver: bridge
